<!doctype html>
<html lang="en" class="h-100" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>laurikohtamaki.fi</title>
    
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/styles.css">

<body class="d-flex flex-column min-vh-100">
    <main class="flex-shrink-0">
        <!-- Main container -->
        <div class="container py-4">
        
        <!-- navigation bar -->
        <div class="container">
            <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
              <a href="/" class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text text-decoration-none">
                <span class="fs-1 fw-bold text-body-emphasis">LK</span>
              </a>
            
              <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
                <li><a href="#" class="nav-link px-2 text-body-emphasis">Home</a></li>
                <li><a href="#" class="nav-link px-2 text-body-emphasis">About</a></li>
              </ul>
            
              <div class="col-md-3 text-end">
                <button type="button" class="btn btn-outline-emphasis me-2">Login</button>
                <button type="button" class="btn btn-outline-emphasis" id="theme-toggle">
                    <i class="bi bi-sun-fill" id="theme-toggle-light-icon"></i>
                    <i class="bi bi-moon-fill" id="theme-toggle-dark-icon"></i>
                </button>
              </div>
            </header>
        </div>
           
        <!-- Jumbotron -->
        <div class="p-5 mb-4 bg-body-tertiary rounded-3">
            <div class="container-fluid py-5">
                <h1 class="display-5 fw-bold">Lauri Kohtamäki</h1>
                <p class="col-md-8 fs-4">an engineer, learning by doing</p>
            </div>
        </div>
            

        <!-- Skills Cards -->
        <div class="container px-4 py-5">
            <div class="row g-4 row-cols-1 row-cols-md-3">
                <!-- Software Development -->
                <div class="col">
                    <div class="card h-100 text-center">
                        <div class="card-body">
                            <i class="bi bi-code-square display-4 mb-3"></i>
                            <h3 class="card-title">Software Development</h3>
                            <img src="images/under.gif" alt="Under Construction" class="img-fluid mt-3">
                        </div>
                    </div>
                </div>

                <!-- Engineering -->
                <div class="col">
                    <div class="card h-100 text-center">
                        <div class="card-body">
                            <i class="bi bi-gear display-4 mb-3"></i>
                            <h3 class="card-title">Engineering</h3>
                            <img src="images/under.gif" alt="Under Construction" class="img-fluid mt-3">
                        </div>
                    </div>
                </div>

                <!-- Innovation -->
                <div class="col">
                    <div class="card h-100 text-center">
                        <div class="card-body">
                            <i class="bi bi-lightbulb display-4 mb-3"></i>
                            <h3 class="card-title">Innovation</h3>
                            <img src="images/under.gif" alt="Under Construction" class="img-fluid mt-3">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-3">
        <div class="container">
            <div class="row align-items-center py-3 border-top">
                <div class="col-md-4 text-start">
                    <span class="text-body-secondary">© <span id="copyright-year"></span> Lauri Kohtamäki</span>
                </div>
                <div class="col-md-4 text-start">
                    <div id="git-info" class="text-body-secondary">
                        <small>
                            Last modified:  
                            <br>
                            Comment: 
                        </small>
                    </div>
                </div>
                <div class="col-md-4">
                    <ul class="nav justify-content-end list-unstyled d-flex">
                        <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#twitter"></use></svg></a></li>
                        <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#instagram"></use></svg></a></li>
                        <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#facebook"></use></svg></a></li>
                    </ul>
                </div>
            </div>
        </div>
